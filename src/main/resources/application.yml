spring:
  application:
    name: oops
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:sqlite:oops.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: true
  flyway:
    enabled: true
    locations: classpath:db/migration/sqlite
    baseline-on-migrate: true
    baseline-version: 1

oops:
  pipeline:
    image:
      clone: alpine/git:v2.49.0
      zip: alpine/curl:8.17.0
      push: quay.io/buildah/stable:v1.43.1
      registry-mirrors:
        docker.io: docker.m.daocloud.io
      unzip-excludes:
        - .git/*
        - "*/.git/*"
        - node_modules/*
        - "*/node_modules/*"
        - __MACOSX
        - __MACOSX/*
        - "*/__MACOSX"
        - "*/__MACOSX/*"
        - .DS_Store
        - "*/.DS_Store"
  ingress:
    cert-resolver: letsencrypt-prod
  jwt:
    secret: oops-jwt-secret-key-please-change-in-production-must-be-at-least-32-chars
    expiration: 604800000
  feishu:
    enabled: true
    app-id: cli_a94357a9437adbde
    app-secret: 4NmRc7eJ5c28hdUdpnu7cLSm5LRa6fmM
    redirect-uri: http://localhost:3000/auth/feishu/callback
  ide:
    enabled: true
    https: true
    domain: ide.k8s.orb.local
    image: coder-self:1.0.0
    middlewares: []
    proxy-domain: "{{port}}-{{host}}"
  object-storage:
    enabled: true
    endpoint: https://oss-cn-zhangjiakou.aliyuncs.com
    region: cn-hangzhou
    bucket: ds-app-static
    access-key: your-access-key
    secret-key: your-secret-key
    path-style-access: false
    key-prefix: oops-package
    upload-url-expiration-seconds: 900
    download-url-expiration-seconds: 1800
    max-file-size-bytes: 524288000
  sandbox:
    images:
      - python:3.12-slim
      - node:20-slim
