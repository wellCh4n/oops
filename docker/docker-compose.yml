name: oops

services:
  oops:
    build:
      context: ..
    container_name: oops
    ports:
      - "8080:80"
    environment:
      ADMIN_PASSWORD: admin123
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/oops.db
    volumes:
      - oops-data:/app/data
    restart: unless-stopped

volumes:
  oops-data:
